services:
  - type: web
    name: limit-pump-game
    runtime: node
    plan: free
    buildCommand: npm ci && npm run render:build
    startCommand: npm run render:start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.13.0
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
